name: home_module
description: "Intermediate module for orchestrating the home screen and dashboards for the 3 roles."
publish_to: "none"
version: 0.0.1

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_bloc: ^8.1.6
  go_router: ^14.2.0
  get_it: ^8.0.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  dio: ^5.7.0
  equatable: ^2.0.5
  server_module:
    path: ../server_module
  authentication_module:
    path: ../authentication_module
  booking_module:
    path: ../booking_module
  app_module:
    path: ../app_module
  facility_module:
    path: ../facility_module
  payment_module:
    path: ../payment_module
  user_management_module:
    path: ../user_management_module
  review_module:
    path: ../review_module
  notification_module:
    path: ../notification_module

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
