name: sports_management
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Internal modules
  server_module:
    path: ./modules/server_module
  app_module:
    path: ./modules/app_module
  home_module:
    path: ./modules/home_module
  authentication_module:
    path: ./modules/authentication_module
  booking_module:
    path: ./modules/booking_module
  facility_module:
    path: ./modules/facility_module
  payment_module:
    path: ./modules/payment_module
  user_management_module:
    path: ./modules/user_management_module
  review_module:
    path: ./modules/review_module
  notification_module:
    path: ./modules/notification_module
  matching_module:
    path: ./modules/matching_module

  # UI & State Management
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  device_preview: ^1.2.0

  # Networking & Data
  dio: ^5.7.0
  socket_io_client: ^2.0.3
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.0

  # Persistence & Security
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # Routing
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^8.0.2

  # Firebase Services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  android_intent_plus: ^5.1.0  # Explicit Android Intent (mở thẳng ZaloPay Sandbox)
  webview_flutter: ^4.10.0     # In-app WebView để hiển thị ZaloPay gateway

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.0
  build_runner: ^2.4.13
  pretty_dio_logger: ^1.4.0
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  intl: ^0.20.2
